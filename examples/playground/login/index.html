<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Tomation Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Sora, ui-sans-serif, system-ui;
      background:
        radial-gradient(circle at 20% 20%, rgba(34,197,94,0.2), transparent 35%),
        radial-gradient(circle at 80% 0%, rgba(16,185,129,0.16), transparent 32%),
        linear-gradient(160deg, #020617 0%, #020b1c 50%, #020617 100%);
    }

    #message.success {
      display: block;
      background: rgba(22, 163, 74, 0.18);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #86efac;
    }

    #message.error {
      display: block;
      background: rgba(220, 38, 38, 0.18);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: #fecaca;
    }
  </style>
</head>
<body class="min-h-full text-slate-100 antialiased">
  <main class="mx-auto flex min-h-screen w-full max-w-md items-center px-5 py-10">
    <div class="w-full rounded-3xl border border-emerald-500/25 bg-slate-900/70 p-7 shadow-[0_0_0_1px_rgba(34,197,94,0.18),0_20px_80px_rgba(2,6,23,0.7)] backdrop-blur">
      <div class="mb-5">
        <h1 class="text-3xl font-bold tracking-tight text-white">Login</h1>
        <p class="mt-2 text-sm text-slate-300">Use admin / password123 for valid access.</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="username" class="mb-1.5 block text-sm font-medium text-slate-200">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:border-emerald-400 focus:outline-none">
        </div>
        <div>
          <label for="password" class="mb-1.5 block text-sm font-medium text-slate-200">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:border-emerald-400 focus:outline-none">
        </div>
        <button type="submit" id="login-btn" class="w-full rounded-xl bg-emerald-400 px-4 py-2.5 text-sm font-bold text-emerald-950 transition hover:bg-emerald-300">Log In</button>
      </form>

      <div id="message" class="mt-4 hidden rounded-xl px-3 py-2 text-sm"></div>
    </div>
  </main>

  <script>
    var form = document.getElementById('login-form');
    var messageEl = document.getElementById('message');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      messageEl.className = 'mt-4 hidden rounded-xl px-3 py-2 text-sm';
      messageEl.style.display = 'none';
      messageEl.textContent = '';

      if (!username || !password) {
        messageEl.className = 'mt-4 rounded-xl px-3 py-2 text-sm error';
        messageEl.style.display = 'block';
        messageEl.textContent = 'Username and password are required';
        return;
      }

      if (username === 'admin' && password === 'password123') {
        messageEl.className = 'mt-4 rounded-xl px-3 py-2 text-sm success';
        messageEl.style.display = 'block';
        messageEl.textContent = 'Login successful! Welcome, admin.';
      } else {
        messageEl.className = 'mt-4 rounded-xl px-3 py-2 text-sm error';
        messageEl.style.display = 'block';
        messageEl.textContent = 'Invalid username or password';
      }
    });
  </script>
</body>
</html>
