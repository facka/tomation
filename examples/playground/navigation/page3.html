<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step 3: Confirmation - Navigation Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Sora, ui-sans-serif, system-ui;
      background:
        radial-gradient(circle at 18% 12%, rgba(34,197,94,0.2), transparent 36%),
        radial-gradient(circle at 84% 0%, rgba(52,211,153,0.16), transparent 35%),
        linear-gradient(160deg, #020617 0%, #020b1c 45%, #020617 100%);
    }
  </style>
</head>
<body class="min-h-full text-slate-100 antialiased">
  <main class="mx-auto flex min-h-screen w-full max-w-xl items-center px-5 py-10">
    <section class="w-full rounded-3xl border border-emerald-500/25 bg-slate-900/70 p-7 text-center shadow-[0_0_0_1px_rgba(34,197,94,0.18),0_20px_80px_rgba(2,6,23,0.7)] backdrop-blur">
      <div class="mb-5 text-xs font-semibold uppercase tracking-[0.18em] text-emerald-300" id="step-indicator">Step 3 of 3</div>
      <h1 class="mb-4 text-3xl font-bold tracking-tight text-white" id="page-title">Confirmation</h1>
      <div class="mb-5 rounded-xl border border-emerald-400/40 bg-emerald-500/15 px-4 py-3 text-sm font-medium text-emerald-200" id="success-message">Wizard completed successfully!</div>
      <p class="mx-auto mb-7 max-w-md text-sm leading-6 text-slate-300" id="page-description">You have reached the final step. The wizard flow is now complete.</p>
      <a href="index.html" class="inline-flex rounded-xl border border-slate-600 bg-slate-900 px-5 py-2.5 text-sm font-semibold text-slate-100 transition hover:border-emerald-400/60" id="restart-btn">Start Over</a>
    </section>
  </main>
</body>
</html>
