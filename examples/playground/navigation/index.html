<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step 1: Welcome - Navigation Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f4f8; }
    .wizard-container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 400px; text-align: center; }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; color: #333; }
    .step-indicator { margin-bottom: 1.5rem; color: #666; font-size: 0.875rem; }
    p { margin-bottom: 1.5rem; color: #555; line-height: 1.5; }
    a.btn { display: inline-block; padding: 0.6rem 1.5rem; background: #4a90d9; color: #fff; text-decoration: none; border-radius: 4px; font-size: 1rem; }
    a.btn:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="wizard-container">
    <div class="step-indicator" id="step-indicator">Step 1 of 3</div>
    <h1 id="page-title">Welcome to the Wizard</h1>
    <p id="page-description">This multi-step wizard demonstrates navigation between pages. Click Next to proceed to the information step.</p>
    <a href="page2.html" class="btn" id="next-btn">Next</a>
  </div>
</body>
</html>
