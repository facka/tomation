<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tomation</title>
  <style>
    /* Base styles — sidebar-appropriate layout */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      color: #1a1a1a;
      background: #ffffff;
      padding: 12px;
      width: 100%;
      min-width: 280px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }

    /* View containers — toggled via display */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* Project / test list styles */
    .spec-section {
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .spec-header {
      background: #f5f5f5;
      padding: 8px 10px;
      font-weight: 600;
      font-size: 12px;
      color: #555;
      border-bottom: 1px solid #e0e0e0;
    }

    .test-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .test-list li {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .test-list li:last-child {
      border-bottom: none;
    }

    .test-list li:hover {
      background: #e8f0fe;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn:hover {
      background: #f0f0f0;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }

    .btn-primary:hover {
      background: #1557b0;
    }

    .btn-danger {
      background: #d93025;
      color: #fff;
      border-color: #d93025;
    }

    .btn-danger:hover {
      background: #b3261e;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Controller bar styles */
    .controller-bar {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid #e0e0e0;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 8px;
    }

    /* Manual banner styles */
    .manual-banner {
      display: none;
      background: #fef7e0;
      border: 1px solid #f9ab00;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .manual-banner.visible {
      display: block;
    }

    .manual-banner p {
      margin-bottom: 8px;
      font-weight: 500;
      color: #5f4b00;
    }

    /* Log styles */
    .log-container {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }

    .log-entry {
      padding: 6px 10px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-entry.pass {
      border-left: 3px solid #34a853;
    }

    .log-entry.fail {
      border-left: 3px solid #d93025;
    }

    .log-entry.task-header {
      background: #f5f5f5;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .log-entry.indented {
      padding-left: 22px;
    }

    .log-entry.action-buttons {
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      border-left: 3px solid #d93025;
    }

    .log-entry.skipped {
      border-left: 3px solid #9e9e9e;
      color: #757575;
    }

    .log-summary {
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 4px;
      margin-top: 8px;
      font-weight: 500;
    }

    /* Warning banner */
    .warning-banner {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #664d03;
    }

    .warning-banner.visible {
      display: block;
    }

    /* Create project form */
    .create-project {
      text-align: center;
      padding: 24px 12px;
    }

    .create-project p {
      margin-bottom: 12px;
      color: #555;
    }

    /* File input styling */
    .file-input-wrapper {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    /* Step checklist styles */
    .step-checklist {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .step-checklist li {
      padding: 6px 10px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-checklist li.indented {
      padding-left: 28px;
    }

    .step-checklist li label {
      flex: 1;
      cursor: pointer;
      font-size: 12px;
    }

    /* Configuration section */
    .config-section {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background: #fafafa;
    }

    .config-section h3 {
      margin-bottom: 8px;
    }

    .config-row {
      margin-bottom: 6px;
    }

    .config-row:last-child {
      margin-bottom: 0;
    }

    .config-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .config-row select {
      margin-left: 4px;
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }

    /* Search input */
    #search-input {
      display: block;
      width: 100%;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    #search-empty-state {
      padding: 12px;
      color: #555;
      text-align: center;
      font-size: 12px;
    }

    /* Error view */
    .error-message {
      background: #fce8e6;
      border: 1px solid #d93025;
      border-radius: 4px;
      padding: 12px;
      color: #5f2120;
    }

    /* Tooltip styles for element labels */
    .has-tooltip {
      cursor: help;
      border-bottom: 1px dotted #999;
    }

    /* Step label component styles */
    .step-action {
      font-weight: 500;
      color: #444;
    }

    .element-badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a56db;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      cursor: help;
      border-bottom: 1px dotted #1a56db;
    }

    .element-badge:hover {
      background: #d2e3fc;
    }

    .step-value {
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <!-- Home View -->
  <div id="view-home" class="view active">
    <h1>Tomation</h1>
    <div id="warning-banner" class="warning-banner"></div>
    <input type="text" id="search-input" maxlength="100" placeholder="Search tests..." />
    <div id="project-content"></div>
    <div id="search-empty-state" style="display:none;">No tests found</div>
    <div class="file-input-wrapper">
      <button id="load-spec-btn" class="btn btn-primary">Load Spec</button>
      <input type="file" id="spec-file-input" accept=".json" />
    </div>
  </div>

  <!-- Test Plan View -->
  <div id="view-test-plan" class="view">
    <h2 id="test-plan-title"></h2>
    <ul id="step-checklist" class="step-checklist"></ul>
    <div id="config-section" class="config-section">
      <h3>Configuration</h3>
      <div class="config-row">
        <label>
          <input type="checkbox" id="config-continue-on-failure" />
          Allow continue on failure
        </label>
      </div>
      <div class="config-row">
        <label>
          <input type="checkbox" id="config-retry-on-failure" />
          Allow retry on failure
        </label>
      </div>
      <div class="config-row">
        <label>
          Execution speed
          <select id="config-execution-speed">
            <option value="FAST">FAST</option>
            <option value="NORMAL" selected>NORMAL</option>
            <option value="SLOW">SLOW</option>
          </select>
        </label>
      </div>
    </div>
    <div style="margin-top: 12px;">
      <button id="run-btn" class="btn btn-primary">Run</button>
      <button id="back-home-btn" class="btn">Back</button>
    </div>
  </div>

  <!-- Run View -->
  <div id="view-run" class="view">
    <h2 id="run-title"></h2>
    <div class="controller-bar">
      <button id="pause-btn" class="btn">Pause</button>
      <button id="continue-btn" class="btn" disabled>Continue</button>
      <button id="stop-btn" class="btn btn-danger">Stop</button>
    </div>
    <div id="manual-banner" class="manual-banner">
      <p id="manual-description"></p>
      <button id="manual-continue-btn" class="btn btn-primary">Continue</button>
    </div>
    <div id="log-container" class="log-container"></div>
    <div id="run-summary" class="log-summary" style="display:none;"></div>
    <div id="run-done-actions" style="display:none; margin-top:10px;">
      <button id="back-home-from-run-btn" class="btn">Back to Home</button>
    </div>
  </div>

  <!-- Error View -->
  <div id="view-error" class="view">
    <h2>Error</h2>
    <div id="error-message" class="error-message"></div>
    <div style="margin-top: 12px;">
      <button id="error-back-btn" class="btn">Back to Home</button>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="panel.js"></script>
</body>
</html>
